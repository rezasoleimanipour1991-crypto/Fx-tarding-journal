  /* Boot diagnostics: if a script error happens before the app mounts, show it instead of a blank screen. */
  window.__bootOk = false;
  window.addEventListener("error", function (e) {
    showBootError("Script error: " + (e.message || "unknown error") + (e.lineno ? " (line " + e.lineno + ")" : ""));
  });
  function showBootError(msg) {
    if (window.__bootOk) return;
    var el2 = document.getElementById("boot-error");
    if (el2) { el2.classList.add("show"); el2.innerHTML = "<b>Details:</b>\n" + msg; }
  }

  /* Register the real service worker file for offline support and PWA store-readiness.
     This is safe to fail silently — the app works fully without it.
     We also actively call update() on every load so a fixed/updated
     service worker takes over as soon as possible, rather than waiting
     for the browser's normal (much slower) background update check. */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("/sw.js").then(function (reg) {
        reg.update().catch(function () {});
      }).catch(function (err) {
        console.warn("Service worker registration failed (app still works fully without it):", err);
      });
    });
  }

/* ============================================================
   PERSISTENT STORAGE (IndexedDB) — fully offline, no network.
   ============================================================ */
const DB_NAME = "fx_discipline_db";
const DB_VERSION = 1;
const STORE_NAME = "appState";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbGet(key) {
  try {
    const db = await openDB();
    return await new Promise((res, rej) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const r = tx.objectStore(STORE_NAME).get(key);
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  } catch (e) { console.error("dbGet failed", e); return undefined; }
}
async function dbSet(key, value) {
  try {
    const db = await openDB();
    return await new Promise((res, rej) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const r = tx.objectStore(STORE_NAME).put(value, key);
      r.onsuccess = () => res(true);
      r.onerror = () => rej(r.error);
    });
  } catch (e) { console.error("dbSet failed", e); return false; }
}

const KEYS = { trades: "trades", strategies: "strategies", symbols: "symbols", eduNotes: "eduNotes", eduFiles: "eduFiles", newsEvents: "newsEvents", settings: "settings", accounts: "accounts", initialized: "initialized" };

async function loadAppState() {
  const initialized = await dbGet(KEYS.initialized);
  if (!initialized) return null;
  const [trades, strategies, symbols, eduNotes, eduFiles, newsEvents, settings, accounts] = await Promise.all(
    [KEYS.trades, KEYS.strategies, KEYS.symbols, KEYS.eduNotes, KEYS.eduFiles, KEYS.newsEvents, KEYS.settings, KEYS.accounts].map(dbGet)
  );
  return { trades, strategies, symbols, eduNotes, eduFiles, newsEvents, settings, accounts };
}
async function saveAppState(state) {
  await Promise.all([
    dbSet(KEYS.trades, state.trades), dbSet(KEYS.strategies, state.strategies),
    dbSet(KEYS.symbols, state.symbols), dbSet(KEYS.eduNotes, state.eduNotes),
    dbSet(KEYS.eduFiles, state.eduFiles), dbSet(KEYS.newsEvents, state.newsEvents),
    dbSet(KEYS.settings, state.settings), dbSet(KEYS.accounts, state.accounts), dbSet(KEYS.initialized, true),
  ]);
}
function exportToFile(state) {
  const payload = { appName: "FX Discipline", exportedAt: new Date().toISOString(), version: 1, data: state };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `fx-discipline-backup-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed.data) throw new Error("Invalid backup file format");
        resolve(parsed.data);
      } catch (e) { reject(e); }
    };
    reader.onerror = () => reject(reader.error);
    reader.readAsText(file);
  });
}

/* ============================================================
   TINY DOM HELPERS (no framework)
   ============================================================ */
function el(tag, attrs, children) {
  const node = document.createElement(tag);
  attrs = attrs || {};
  for (const k in attrs) {
    if (k === "style" && typeof attrs[k] === "object") {
      Object.assign(node.style, attrs[k]);
    } else if (k.startsWith("on") && typeof attrs[k] === "function") {
      node.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    } else if (k === "html") {
      node.innerHTML = attrs[k];
    } else if (k === "className") {
      node.className = attrs[k];
    } else if (attrs[k] !== undefined && attrs[k] !== null && attrs[k] !== false) {
      node.setAttribute(k, attrs[k] === true ? "" : attrs[k]);
    }
  }
  children = children || [];
  if (!Array.isArray(children)) children = [children];
  children.forEach((c) => {
    if (c === null || c === undefined || c === false) return;
    node.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(c) : c);
  });
  return node;
}
function svgEl(tag, attrs, children) {
  const node = document.createElementNS("http://www.w3.org/2000/svg", tag);
  attrs = attrs || {};
  for (const k in attrs) {
    if (attrs[k] !== undefined && attrs[k] !== null) node.setAttribute(k, attrs[k]);
  }
  (children || []).forEach((c) => node.appendChild(c));
  return node;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

const SESSION_OPTIONS = ["Asia", "London", "New York", "London/New York Overlap"];

/* Suggests a trading session from a 24h local time string "HH:MM" or "HH:MM:SS".
   Uses commonly-referenced approximate session windows (local browser time):
   Asia 00:00-08:00, London 08:00-13:00, Overlap 13:00-16:00, New York 16:00-21:00.
   This is a starting suggestion only — always editable by the user since real
   session boundaries depend on the user's timezone and DST. */
function suggestSession(timeStr) {
  if (!timeStr) return SESSION_OPTIONS[0];
  const hour = Number(timeStr.split(":")[0]);
  if (isNaN(hour)) return SESSION_OPTIONS[0];
  if (hour >= 0 && hour < 8) return "Asia";
  if (hour >= 8 && hour < 13) return "London";
  if (hour >= 13 && hour < 16) return "London/New York Overlap";
  if (hour >= 16 && hour < 21) return "New York";
  return "Asia";
}

function computeStats(trades) {
  const wins = trades.filter((t) => t.result === "Win");
  const losses = trades.filter((t) => t.result === "Loss");
  const net = trades.reduce((s, t) => s + t.pnl, 0);
  const grossWin = wins.reduce((s, t) => s + t.pnl, 0);
  const grossLoss = Math.abs(losses.reduce((s, t) => s + t.pnl, 0));
  const winRate = trades.length ? (wins.length / trades.length) * 100 : 0;
  const profitFactor = grossLoss ? grossWin / grossLoss : grossWin > 0 ? Infinity : 0;
  let peak = -Infinity, maxDD = 0, running = 10000;
  trades.forEach((t) => {
    running += t.pnl;
    if (running > peak) peak = running;
    const dd = peak - running;
    if (dd > maxDD) maxDD = dd;
  });
  return {
    net, winRate, profitFactor, maxDD, total: trades.length, wins: wins.length, losses: losses.length,
    winLossRatio: losses.length ? wins.length / losses.length : wins.length,
    recoveryFactor: maxDD ? net / maxDD : 0,
  };
}

const PAIRS = ["XAUUSD", "EURUSD", "GBPUSD", "BTCUSD", "USDJPY"];

const EMOTIONS = ["Calm", "Confident", "Anxious", "FOMO", "Frustrated", "Neutral"];

function genTrades() {
  const trades = [];
  let equity = 10000;
  const startDate = new Date(2026, 3, 1);
  for (let i = 0; i < 42; i++) {
    const date = new Date(startDate);
    date.setDate(date.getDate() + Math.floor(i * 1.6));
    const pair = PAIRS[Math.floor(Math.random() * PAIRS.length)];
    const isWin = Math.random() > 0.42;
    const isBE = !isWin && Math.random() > 0.85;
    const result = isBE ? "Breakeven" : isWin ? "Win" : "Loss";
    const pnl = result === "Breakeven" ? 0 : result === "Win"
      ? +(Math.random() * 380 + 40).toFixed(2)
      : -(Math.random() * 260 + 30).toFixed(2);
    equity += Number(pnl);
    const hour = Math.floor(Math.random() * 24);
    const minute = Math.floor(Math.random() * 60);
    const second = Math.floor(Math.random() * 60);
    const timeStr = `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}:${String(second).padStart(2, "0")}`;
    trades.push({
      id: uid("T"), date: date.toISOString().slice(0, 10), time: timeStr, pair,
      type: Math.random() > 0.5 ? "Buy" : "Sell",
      entry: (1.05 + Math.random() * 0.5).toFixed(4),
      sl: (1.0 + Math.random() * 0.3).toFixed(4),
      tp: (1.1 + Math.random() * 0.6).toFixed(4),
      lot: (Math.random() * 2 + 0.1).toFixed(2),
      risk: (Math.random() * 2 + 0.5).toFixed(1),
      result, pnl: Number(pnl), equity: Math.round(equity),
      strategy: Math.random() > 0.5 ? "Breakout Momentum" : "Liquidity Sweep",
      session: suggestSession(timeStr),
      hour,
      day: date.toLocaleDateString("en-US", { weekday: "short" }),
      emotion: EMOTIONS[Math.floor(Math.random() * EMOTIONS.length)],
      confidence: Math.floor(Math.random() * 5) + 1,
      mistakes: result === "Loss" && Math.random() > 0.4 ? [MISTAKES[Math.floor(Math.random() * MISTAKES.length)]] : [],
      notes: "", specialNotes: "",
      account: "Main Account",
      commission: -(Math.random() * 4 + 0.5).toFixed(2),
      media: [],
    });
  }
  return trades;
}

function Icon(paths, size, color) {
  size = size || 18;
  const svg = svgEl("svg", {

/* Area/line chart (equity curve) */
function areaChart(values, opts) {
  opts = opts || {};
  const w = 320, h = opts.height || 160, pad = 6;
  const min = Math.min(...values), max = Math.max(...values);
  const range = (max - min) || 1;
  const stepX = (w - pad * 2) / (values.length - 1 || 1);
  const points = values.map((v, i) => {
    const x = pad + i * stepX;
    const y = pad + (1 - (v - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const linePath = points.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
  const areaPath = `${linePath} L${points[points.length - 1][0]},${h - pad} L${points[0][0]},${h - pad} Z`;

  const gradId = "grad" + Math.floor(Math.random() * 1e6);
  const defs = svgEl("defs", {}, [
    svgEl("linearGradient", { id: gradId, x1: "0", y1: "0", x2: "0", y2: "1" }, [
      svgEl("stop", { offset: "0%", "stop-color": C.accent, "stop-opacity": "0.35" }),
      svgEl("stop", { offset: "100%", "stop-color": C.accent, "stop-opacity": "0" }),
    ]),
  ]);

  const svg = svgEl("svg", { viewBox: `0 0 ${w} ${h}`, width: "100%", height: h, preserveAspectRatio: "none" }, [
    defs,
    svgEl("path", { d: areaPath, fill: `url(#${gradId})`, stroke: "none" }),
    svgEl("path", { d: linePath, fill: "none", stroke: C.accent, "stroke-width": "2", "stroke-linejoin": "round" }),
  ]);

  // Hover/touch tooltip
  const tooltip = el("div", {
    style: { position: "absolute", display: "none", background: C.cardAlt, border: `1px solid ${C.border}`, borderRadius: "8px", padding: "6px 10px", fontSize: "12px", color: C.text, pointerEvents: "none", whiteSpace: "nowrap", zIndex: "10" },
  });
  const container = el("div", { style: { position: "relative", width: "100%" } }, [svg, tooltip]);

  function handleMove(clientX) {
    const rect = svg.getBoundingClientRect();
    const relX = ((clientX - rect.left) / rect.width) * w;
    let idx = Math.round((relX - pad) / stepX);
    idx = Math.max(0, Math.min(values.length - 1, idx));
    const p = points[idx];
    tooltip.textContent = (opts.money ? fmtMoney(values[idx]) : values[idx]);
    tooltip.style.display = "block";
    tooltip.style.left = Math.min(Math.max((p[0] / w) * rect.width - 30, 0), rect.width - 60) + "px";
    tooltip.style.top = Math.max((p[1] / h) * rect.height - 34, 0) + "px";
  }
  svg.addEventListener("mousemove", (e) => handleMove(e.clientX));
  svg.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });
  svg.addEventListener("touchstart", (e) => handleMove(e.touches[0].clientX), { passive: true });
  svg.addEventListener("touchmove", (e) => handleMove(e.touches[0].clientX), { passive: true });
  svg.addEventListener("touchend", () => { tooltip.style.display = "none"; });

  return container;
}

  const barW = (w - pad * 2 - gap * (data.length - 1)) / data.length;

    const x = pad + i * (barW + gap);

/* ============================================================
   CSV PARSER — minimal, dependency-free, handles quoted fields
   containing commas, escaped quotes (""), and CRLF/LF newlines.
   Returns an array of row-arrays (strings). First row is
   typically the header; caller decides how to use it.
   ============================================================ */
function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = "";
  let inQuotes = false;
  let i = 0;
  const len = text.length;

  while (i < len) {
    const char = text[i];

    if (inQuotes) {
      if (char === '"') {
        if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += char; i++; continue;
    }

    if (char === '"') { inQuotes = true; i++; continue; }
    if (char === ",") { row.push(field); field = ""; i++; continue; }
    if (char === "\r") { i++; continue; } // normalize CRLF -> LF
    if (char === "\n") {
      row.push(field); field = "";
      rows.push(row); row = [];
      i++; continue;
    }
    field += char; i++;
  }
  // last field/row (no trailing newline)
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }

  // Drop fully-empty trailing rows (common with trailing newlines)
  while (rows.length && rows[rows.length - 1].every((c) => c.trim() === "")) rows.pop();

  return rows;
}

/* ============================================================
   COLUMN AUTO-DETECTION — guesses which CSV column corresponds
   to each trade field, based on common header names used by
   MT4/MT5 CSV exports and typical broker statement exports.
   The user can always override the guess before importing.
   ============================================================ */
const FIELD_ALIASES = {
  date: ["date", "open time", "opentime", "time", "date/time"],
  symbol: ["symbol", "pair", "instrument"],
  type: ["type", "action", "side", "direction"],
  volume: ["volume", "lots", "size", "lot size", "lot"],
  entryPrice: ["price", "open price", "openprice", "entry", "entry price"],
  exitPrice: ["close price", "closeprice", "exit", "exit price"],
  profit: ["profit", "pnl", "p&l", "p/l", "net profit"],
  commission: ["commission", "comm"],
  swap: ["swap"],
  sl: ["s / l", "s/l", "stop loss", "sl"],
  tp: ["t / p", "t/p", "take profit", "tp"],
};

function guessColumnMapping(headerRow) {
  const normalized = headerRow.map((h) => h.trim().toLowerCase());
  const mapping = {};
  Object.keys(FIELD_ALIASES).forEach((field) => {
    const aliases = FIELD_ALIASES[field];
    let foundIdx = -1;
    for (const alias of aliases) {
      foundIdx = normalized.findIndex((h) => h === alias);
      if (foundIdx !== -1) break;
    }
    if (foundIdx === -1) {
      // fallback: partial match
      for (const alias of aliases) {
        foundIdx = normalized.findIndex((h) => h.includes(alias));
        if (foundIdx !== -1) break;
      }
    }
    mapping[field] = foundIdx; // -1 if not found
  });
  return mapping;
}

/* Parse a "Buy"/"Sell"/"buy"/"sell"/"0"/"1" style type value into "Buy" or "Sell". */
function normalizeTradeType(raw) {
  const v = String(raw || "").trim().toLowerCase();
  if (v === "buy" || v === "0" || v === "long") return "Buy";
  if (v === "sell" || v === "1" || v === "short") return "Sell";
  return "Buy";
}

/* Parse a date string in several common formats into YYYY-MM-DD.
   Falls back to today's date if unparseable. */
function normalizeDate(raw) {
  if (!raw) return new Date().toISOString().slice(0, 10);
  const s = String(raw).trim();
  // Try native Date parsing first (handles ISO and many common formats)
  const asDate = new Date(s.replace(/\./g, "-").replace(" ", "T"));
  if (!isNaN(asDate.getTime())) return asDate.toISOString().slice(0, 10);
  return new Date().toISOString().slice(0, 10);
}

function parseNumber(raw) {
  if (raw === undefined || raw === null || raw === "") return 0;
  const cleaned = String(raw).replace(/[^0-9.\-]/g, "");
  const n = parseFloat(cleaned);
  return isNaN(n) ? 0 : n;
}

function openOverlay(sheetChildren, opts) {
  opts = opts || {};
  const overlay = el("div", { style: { position: "fixed", inset: "0", zIndex: "60", display: "flex", alignItems: opts.center ? "center" : "flex-end", justifyContent: "center", background: "rgba(0,0,0,0.6)", padding: opts.center ? "24px" : "0" } });
  overlay.addEventListener("click", (e) => { if (e.target === overlay && opts.dismissible !== false) closeIt(); });

  const sheet = el("div", {
    style: Object.assign({
      width: "100%", maxWidth: "420px", margin: "0 auto",
      borderRadius: opts.center ? "20px" : "24px 24px 0 0",

  }, sheetChildren);
  sheet.addEventListener("click", (e) => e.stopPropagation());

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);

  function closeIt() { overlay.remove(); }
  return { overlay, sheet, close: closeIt };
}

/* Text prompt dialog. Returns nothing; calls onSubmit(value) if confirmed. */
function promptDialog(opts) {
  opts = opts || {};
  const state = { value: opts.initialValue || "" };
  let handle;

  const input = textInput({
    value: state.value, placeholder: opts.placeholder || "",
    oninput: (e) => (state.value = e.target.value),
    style: { fontSize: "15px", padding: "12px 14px" },
  });

  const errorLabel = el("span", { style: { color: C.loss, fontSize: "12px", display: "none" } });

  function submit() {
    const v = state.value.trim();
    if (opts.required !== false && !v) {
      errorLabel.textContent = opts.errorText || "This field can't be empty.";
      errorLabel.style.display = "block";
      return;
    }
    handle.close();
    if (opts.onSubmit) opts.onSubmit(v);
  }

  input.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });

  const body = col([
    opts.description ? el("p", { style: { color: C.subtext, fontSize: "12.5px", margin: "0" } }, opts.description) : null,
    input,
    errorLabel,
  ], { gap: 10, style: { padding: "18px 20px" } });

  const footer = row([
    ghostButton(opts.cancelText || "Cancel", () => handle.close(), { bg: C.cardAlt, color: C.subtext }),
    primaryButton(opts.submitText || "Save", submit, {}),
  ], { gap: 10, style: { padding: "16px 20px", borderTop: `1px solid ${C.border}` } });

  handle = openOverlay([dialogHeader(opts.title || "Enter value", () => handle.close()), body, footer], { center: true });
  setTimeout(() => input.focus && input.focus(), 50);
  return handle;
}

/* Confirmation dialog (replaces window.confirm). */
function confirmDialog(opts) {
  opts = opts || {};
  let handle;
  let resolved = false;
  const body = col([
    el("p", { style: { color: C.subtext, fontSize: "13px", margin: "0", lineHeight: "1.6" } }, opts.message || "Are you sure?"),
  ], { style: { padding: "18px 20px" } });

  function doCancel() {
    if (resolved) return;
    resolved = true;
    handle.close();
    if (opts.onCancel) opts.onCancel();
  }
  function doConfirm() {
    if (resolved) return;
    resolved = true;
    handle.close();
    if (opts.onConfirm) opts.onConfirm();
  }

  const footer = row([
    ghostButton(opts.cancelText || "Cancel", doCancel, { bg: C.cardAlt, color: C.subtext }),
    primaryButton(opts.confirmText || "Confirm", doConfirm, { bg: opts.danger ? C.loss : C.accent, color: opts.danger ? "#fff" : "#0F172A" }),
  ], { gap: 10, style: { padding: "16px 20px", borderTop: `1px solid ${C.border}` } });

  handle = openOverlay([dialogHeader(opts.title || "Confirm", doCancel), body, footer], { center: true, dismissible: false });
  handle.overlay.addEventListener("click", (e) => { if (e.target === handle.overlay) doCancel(); });
  return handle;
}

/* Single-select dialog: pick one option from a list (replaces prompt-with-options pattern). */
function selectDialog(opts) {
  opts = opts || {};
  let handle;
  const optionButtons = opts.options.map((optLabel) =>
    el("button", {
      onClick: () => { handle.close(); if (opts.onSelect) opts.onSelect(optLabel); },
      style: { width: "100%", textAlign: "left", padding: "12px 14px", borderRadius: "10px", background: C.cardAlt, border: `1px solid ${C.border}`, color: C.text, fontSize: "13.5px", cursor: "pointer" },
    }, optLabel)
  );
  const body = col(optionButtons, { gap: 8, style: { padding: "16px 20px" } });
  handle = openOverlay([dialogHeader(opts.title || "Choose", () => handle.close()), body], { center: true });
  return handle;
}

/* ============================================================
   MEDIA LIGHTBOX — full-screen viewer for a trade's photos/videos
   ============================================================ */
function openMediaLightbox(mediaList, startIndex) {
  let idx = startIndex || 0;
  const overlay = el("div", { style: { position: "fixed", inset: "0", zIndex: "70", background: "rgba(0,0,0,0.94)", display: "flex", flexDirection: "column" } });

  const topBar = row([
    el("span", { style: { color: "#fff", fontSize: "12px" } }, `${idx + 1} / ${mediaList.length}`),
    el("button", { onClick: () => overlay.remove(), style: { background: "none", border: "none", cursor: "pointer", display: "flex" } }, [Icons.x(22, "#fff")]),
  ], { justify: "space-between", style: { padding: "16px 20px" } });

  const viewerWrap = el("div", { style: { flex: "1", display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", position: "relative" } });

  function renderCurrent() {
    clear(viewerWrap);
    const m = mediaList[idx];
    const node = m.type.startsWith("video")
      ? el("video", { src: m.data, controls: true, autoplay: true, style: { maxWidth: "100%", maxHeight: "100%" } })
      : el("img", { src: m.data, style: { maxWidth: "100%", maxHeight: "100%", objectFit: "contain" } });
    viewerWrap.appendChild(node);
    topBar.firstChild.textContent = `${idx + 1} / ${mediaList.length}`;
  }
  renderCurrent();

  if (mediaList.length > 1) {
    const prevBtn = el("button", {
      onClick: () => { idx = (idx - 1 + mediaList.length) % mediaList.length; renderCurrent(); },
      style: { position: "absolute", left: "8px", top: "50%", transform: "translateY(-50%)", background: "rgba(255,255,255,0.15)", border: "none", borderRadius: "999px", width: "36px", height: "36px", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" },
    }, [Icons.chevronLeft(20, "#fff")]);
    const nextBtn = el("button", {
      onClick: () => { idx = (idx + 1) % mediaList.length; renderCurrent(); },
      style: { position: "absolute", right: "8px", top: "50%", transform: "translateY(-50%)", background: "rgba(255,255,255,0.15)", border: "none", borderRadius: "999px", width: "36px", height: "36px", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" },
    }, [Icons.chevronRight(20, "#fff")]);
    viewerWrap.appendChild(prevBtn);
    viewerWrap.appendChild(nextBtn);
  }

  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
  overlay.appendChild(topBar);
  overlay.appendChild(viewerWrap);
  document.body.appendChild(overlay);
}

/* Estimate the decoded byte size of a base64 data URL and format it human-readable. */
function estimateDataUrlSize(dataUrl) {
  const base64 = dataUrl.split(",")[1] || "";
  const bytes = Math.floor(base64.length * 0.75);
  return bytes;
}
function formatBytes(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}
/* Warn (via confirm dialog) if a file is large enough to strain browser storage.
   Returns a Promise<boolean> resolved true if the user wants to proceed. */
function confirmLargeFileIfNeeded(file) {
  const LARGE_THRESHOLD = 15 * 1024 * 1024; // 15MB
  if (file.size < LARGE_THRESHOLD) return Promise.resolve(true);
  return new Promise((resolve) => {
    confirmDialog({
      title: "Large File Warning",
      message: `"${file.name}" is ${formatBytes(file.size)}. Videos and large images are stored directly on this device and can fill up browser storage quickly. Consider trimming long videos before attaching. Continue anyway?`,
      confirmText: "Attach Anyway",
      cancelText: "Skip This File",
      onConfirm: () => resolve(true),
      onCancel: () => resolve(false),
    });
  });
}

function renderChecklist(state, actions) {

    state._checklistActiveId = strategies[0] ? strategies[0].id : null;
  }
  if (!state._checklistExpanded) state._checklistExpanded = { st1: true };

  const active = strategies.find((s) => s.id === state._checklistActiveId);

  function createStrategyFlow() {
    promptDialog({
      title: "New Strategy",
      description: "Give your trading strategy a name. You can rename it anytime later.",
      placeholder: "e.g. Breakout Momentum",
      submitText: "Create",
      onSubmit: (name) => {
        const newStrat = { id: uid("s"), name, stages: [] };
        state.strategies.push(newStrat);
        state._checklistActiveId = newStrat.id;
        actions.rerender();
      },
    });
  }

  if (!active) {
    return Card([
      el("p", { style: { color: C.subtext, fontSize: "13px", textAlign: "center", margin: "0 0 12px" } }, t("No strategy yet.")),
      primaryButton(t("Create Strategy"), createStrategyFlow, {}),
    ], { style: { alignItems: "center" } });
  }

  function allTasksOf(strategy) {
    let tasks = [];
    strategy.stages.forEach((st) => {
      if (st.subsections) st.subsections.forEach((sub) => tasks.push(...sub.tasks));
      else tasks.push(...(st.tasks || []));
    });
    return tasks;
  }

  const allTasks = allTasksOf(active);
  const completedCount = allTasks.filter((t) => t.done).length;
  const allDone = allTasks.length > 0 && completedCount === allTasks.length;
  const progress = allTasks.length ? (completedCount / allTasks.length) * 100 : 0;

    const stage = active.stages.find((s) => s.id === stageId);

      const t = sub.tasks.find((t) => t.id === taskId);
      t.done = !t.done;
    } else {
      const t = stage.tasks.find((t) => t.id === taskId);
      t.done = !t.done;
    }
    actions.rerender();
  }

        const newTask = { id: uid("t"), label, done: false };

        else stage.tasks.push(newTask);
        actions.rerender();
      },
    });
  }

    const stage = active.stages.find((s) => s.id === stageId);

    if (isOpen) {
      const acc = state.accounts.find((a) => a.name === t.account);
      const details = el("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginTop: "12px", paddingTop: "12px", borderTop: `1px solid ${C.border}` } }, [
        detailRow("Entry Time", t.time || "\u2014"),
        detailRow("Session", t.session || "\u2014"),
        detailRow("Entry", t.entry), detailRow("Stop Loss", t.sl), detailRow("Take Profit", t.tp),
        detailRow("Lot Size", t.lot), detailRow("Risk %", t.risk + "%"), detailRow("Commission", t.commission ? fmtMoney(Number(t.commission)) : "\u2014"),
        detailRow("Emotion", t.emotion), detailRow("Confidence", `${t.confidence}/5`),
        detailRow("Account", t.account || "\u2014"),
        acc && acc.number ? detailRow("Account #", acc.number) : null,
      ]);
      if (t.mistakes && t.mistakes.length) {
        const mistakeWrap = el("div", { style: { gridColumn: "1 / -1", display: "flex", flexWrap: "wrap", gap: "6px", marginTop: "4px" } }, t.mistakes.map((m) => pill(m, C.loss, "rgba(239,68,68,0.12)")));
        details.appendChild(mistakeWrap);
      }
      if (t.specialNotes) {
        details.appendChild(el("div", { style: { gridColumn: "1 / -1", marginTop: "4px", padding: "10px", borderRadius: "10px", background: "rgba(56,189,248,0.08)", border: `1px solid rgba(56,189,248,0.25)` } }, [
          el("span", { style: { color: C.accent, fontSize: "10.5px", fontWeight: "700", display: "block", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.4px" } }, "Special Notes"),
          el("span", { style: { color: C.text, fontSize: "12.5px" } }, t.specialNotes),
        ]));
      }
      if (t.notes) {
        details.appendChild(el("div", { style: { gridColumn: "1 / -1", marginTop: "4px" } }, [
          el("span", { style: { color: C.subtext, fontSize: "10.5px", display: "block", marginBottom: "2px" } }, "Notes"),
          el("span", { style: { color: C.text, fontSize: "12.5px" } }, t.notes),
        ]));
      }
      children.push(details);

      const media = t.media || [];
      const mediaSection = el("div", { style: { marginTop: "12px" } });
      mediaSection.appendChild(row([
        row([Icons.image(13, C.subtext), el("span", { style: { color: C.subtext, fontSize: "11px" } }, media.length ? `${media.length} attachment${media.length > 1 ? "s" : ""} \u2014 tap to view` : "No media attached")], { gap: 6 }),
      ], { justify: "space-between" }));

      if (media.length) mediaSection.appendChild(mediaThumbGrid(media, (m) => { t.media = t.media.filter((x) => x.id !== m.id); actions.rerender(); }));

      const mediaInput = el("input", { type: "file", accept: "image/*,video/*", multiple: true, style: { display: "none" } });
      mediaInput.addEventListener("change", (e) => {

      mediaSection.appendChild(ghostButton("Add Photo / Video", () => mediaInput.click(), { icon: Icons.upload(13, C.accent), style: { marginTop: "8px", padding: "8px" } }));
      mediaSection.appendChild(mediaInput);

      children.push(mediaSection);
    }
    return Card(children, { style: { padding: "14px" } });
  }

  function rebuildList() {
    clear(listWrap);
    const filtered = state.trades.filter((t) =>
      (state._journalFilterPair === "All" || t.pair === state._journalFilterPair) &&
      (state._journalFilterStrategy === "All" || t.strategy === state._journalFilterStrategy) &&
      (state._journalFilterAccount === "All" || t.account === state._journalFilterAccount) &&
      (state._journalSearch === "" || t.pair.toLowerCase().includes(state._journalSearch.toLowerCase()))
    ).slice().reverse();
    const list = filtered.length ? col(filtered.map(tradeCard), { gap: 8 }) : emptyState(t("No trades match these filters."));

  }
  rebuildList();

  container.appendChild(searchBox);
  container.appendChild(pairChips);
  container.appendChild(stratChips);
  container.appendChild(accountChips);
  container.appendChild(addBtn);
  container.appendChild(listWrap);

  return container;
}

/* Read a File object as a base64 data URL (works fully offline). */
function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

/* ============================================================
   CALENDAR-BASED GROUPING HELPERS
   Groups trades by actual calendar date, ISO week, and month
   (not just "day of week" buckets), so "best/worst" reflects
   real dates the person can look back at.
   ============================================================ */
function isoWeekKey(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  // ISO week calculation
  const target = new Date(d.valueOf());
  const dayNr = (d.getDay() + 6) % 7;
  target.setDate(target.getDate() - dayNr + 3);
  const firstThursday = new Date(target.getFullYear(), 0, 4);
  const diff = target - firstThursday;
  const week = 1 + Math.round(diff / (7 * 24 * 60 * 60 * 1000));
  return `${target.getFullYear()}-W${String(week).padStart(2, "0")}`;
}
function monthKey(dateStr) {
  return dateStr.slice(0, 7); // YYYY-MM
}
function formatMonthLabel(key) {
  const [y, m] = key.split("-").map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString("en-US", { month: "short", year: "numeric" });
}
function formatWeekLabel(key) {
  return key.replace("-W", " \u00b7 Week ");
}

function groupTradesBy(trades, keyFn) {
  const groups = {};
  trades.forEach((t) => {
    const key = keyFn(t);
    if (!groups[key]) groups[key] = { key, trades: [], pnl: 0, wins: 0, losses: 0 };
    groups[key].trades.push(t);
    groups[key].pnl += t.pnl;
    if (t.result === "Win") groups[key].wins++;
    if (t.result === "Loss") groups[key].losses++;
  });
  return Object.values(groups);
}

function bestAndWorst(groups) {
  if (!groups.length) return { best: null, worst: null };
  const sorted = groups.slice().sort((a, b) => b.pnl - a.pnl);
  return { best: sorted[0], worst: sorted[sorted.length - 1] };
}

      const data = await importFromFile(file);
      state.trades = data.trades || [];
      state.strategies = data.strategies && data.strategies.length ? data.strategies : DEFAULT_STRATEGIES;
      state.symbols = data.symbols && data.symbols.length ? data.symbols : PAIRS;
      state.eduNotes = data.eduNotes || [];
      state.eduFiles = data.eduFiles || [];
      state.settings = data.settings || { lang: "English", theme: "Dark", pin: false };
      state.accounts = data.accounts && data.accounts.length ? data.accounts : DEFAULT_ACCOUNTS.slice();
      applyTheme(state.settings.theme);
      state._importStatusMsg = { ok: true, message: "Backup restored successfully." };
    } catch (err) {
      state._importStatusMsg = { ok: false, message: "Could not read that file. Make sure it's a valid backup .json." };
    }
    actions.rerender();
    setTimeout(() => { state._importStatusMsg = null; actions.rerender(); }, 5000);
  });

  const dataCard = Card([
    sectionTitle(t("Data Management")),
    row([Icons.checklist(12, C.profit), el("span", { style: { color: C.subtext, fontSize: "11.5px" } }, t("All data is saved automatically on this device."))], { gap: 6, style: { marginBottom: "4px" } }),
    ghostButton(t("Export Backup File (.json)"), () => exportToFile({ trades: state.trades, strategies: state.strategies, symbols: state.symbols, eduNotes: state.eduNotes, eduFiles: state.eduFiles, newsEvents: state.newsEvents, settings: state.settings, accounts: state.accounts }), { icon: Icons.download(14, C.text), color: C.text }),
    ghostButton(t("Import Backup File (.json)"), () => fileInput.click(), { icon: Icons.upload(14, C.text), color: C.text }),
    fileInput,
    state._importStatusMsg ? row([state._importStatusMsg.ok ? Icons.check(13, C.profit) : Icons.alert(13, C.loss), el("span", { style: { color: state._importStatusMsg.ok ? C.profit : C.loss, fontSize: "12px" } }, state._importStatusMsg.message)], { gap: 6 }) : null,
    el("div", { style: { color: C.subtext, fontSize: "11px", lineHeight: "1.5" } }, "Export creates a single file with all your trades, strategies, notes and settings. Move that file to another device (e.g. via email, USB, or cloud storage) and use Import there to bring everything over."),
  ], { style: { gap: "10px" } });

  const symbolChips = row(state.symbols.map((s) => row([
    el("span", { style: { color: C.text, fontSize: "12px", fontWeight: "600" } }, s),
    el("button", { onClick: () => { state.symbols = state.symbols.filter((x) => x !== s); actions.rerender(); }, style: { background: "none", border: "none", cursor: "pointer", display: "flex" } }, [Icons.x(12, C.subtext)]),
  ], { gap: 6, style: { padding: "6px 10px", borderRadius: "8px", background: C.cardAlt } })), { gap: 8, style: { flexWrap: "wrap" } });

  const symbolInputRow = row([
    textInput({ value: state._newSymbolInput, placeholder: "e.g. USDCAD", oninput: (e) => (state._newSymbolInput = e.target.value), style: { flex: "1" } }),
    el("button", {
      onClick: () => {
        if (!state._newSymbolInput.trim()) return;
        state.symbols.push(state._newSymbolInput.trim().toUpperCase());
        state._newSymbolInput = "";
        actions.rerender();
      },
      style: { padding: "0 16px", borderRadius: "10px", background: C.accent, color: "#0F172A", border: "none", cursor: "pointer", display: "flex", alignItems: "center" },
    }, [Icons.plus(16, "#0F172A")]),
  ], { gap: 8 });

  const symbolsCard = Card([sectionTitle(t("Trading Symbols")), symbolChips, symbolInputRow], { style: { gap: "12px" } });

  function openAccountDialog(existing) {
    const form = { name: existing ? existing.name : "", number: existing ? existing.number : "", broker: existing ? existing.broker : "" };
    let handle;
    const nameInput = textInput({ value: form.name, placeholder: "e.g. Main Account", oninput: (e) => (form.name = e.target.value) });
    const numberInput = textInput({ value: form.number, placeholder: "e.g. 1024578", oninput: (e) => (form.number = e.target.value) });
    const brokerInput = textInput({ value: form.broker, placeholder: "e.g. IC Markets", oninput: (e) => (form.broker = e.target.value) });
    const errorLabel = el("span", { style: { color: C.loss, fontSize: "12px", display: "none" } });

    const bodyEl = col([
      field("Account Name", nameInput),
      field("Account Number", numberInput),
      field("Broker (optional)", brokerInput),
      errorLabel,
    ], { gap: 12, style: { padding: "18px 20px" } });

    function submit() {
      if (!form.name.trim()) { errorLabel.textContent = "Account name is required."; errorLabel.style.display = "block"; return; }
      if (existing) {
        existing.name = form.name.trim(); existing.number = form.number.trim(); existing.broker = form.broker.trim();
      } else {
        state.accounts.push({ id: uid("acc"), name: form.name.trim(), number: form.number.trim(), broker: form.broker.trim() });
      }
      handle.close();
      actions.rerender();
    }

    const footer = row([
      ghostButton("Cancel", () => handle.close(), { bg: C.cardAlt, color: C.subtext }),
      primaryButton(existing ? "Save" : "Add Account", submit, {}),
    ], { gap: 10, style: { padding: "16px 20px", borderTop: `1px solid ${C.border}` } });

    handle = openOverlay([dialogHeader(existing ? "Edit Account" : "New Trading Account", () => handle.close()), bodyEl, footer], { center: true });
  }

  function deleteAccount(acc) {
    confirmDialog({
      title: "Delete Account",
      message: `Delete "${acc.name}"? Trades already logged under this account will keep the account name as text, but it will no longer appear as a selectable option.`,
      confirmText: "Delete", danger: true,
      onConfirm: () => { state.accounts = state.accounts.filter((a) => a.id !== acc.id); actions.rerender(); },
    });
  }

  const accountRows = state.accounts.length
    ? col(state.accounts.map((acc) => Card([
        row([
          col([
            el("span", { style: { color: C.text, fontSize: "13px", fontWeight: "600" } }, acc.name),
            el("span", { style: { color: C.subtext, fontSize: "11px" } }, [acc.number ? "# " + acc.number : "No account number", acc.broker ? " \u00b7 " + acc.broker : ""].join("")),
          ], { gap: 2 }),
          row([
            el("button", { onClick: () => openAccountDialog(acc), style: { background: "none", border: "none", cursor: "pointer", display: "flex", padding: "4px" } }, [Icons.file(14, C.subtext)]),
            el("button", { onClick: () => deleteAccount(acc), style: { background: "none", border: "none", cursor: "pointer", display: "flex", padding: "4px" } }, [Icons.trash(14, C.loss)]),
          ], { gap: 4 }),
        ], { justify: "space-between" }),
      ], { style: { padding: "12px 14px" } })), { gap: 8 })
    : emptyState(t("No trading accounts yet."));

  const accountsCard = Card([
    sectionTitle(t("Trading Accounts")),
    accountRows,
    ghostButton(t("Add Trading Account"), () => openAccountDialog(null), { icon: Icons.plus(14, C.accent), style: { marginTop: "10px" } }),
  ], { style: { gap: "10px" } });

  return col([langCard, themeCard, lockCard, dataCard, accountsCard, symbolsCard], { gap: 12, style: { paddingBottom: "16px" } });
}
"use strict";

const NAV_ITEMS = [
  { id: "dashboard", label: "Dashboard", icon: Icons.dashboard },
  { id: "checklist", label: "Checklist", icon: Icons.checklist },
  { id: "journal", label: "Journal", icon: Icons.journal },
  { id: "import", label: "Import", icon: Icons.upload },
  { id: "analytics", label: "Analytics", icon: Icons.analytics },
  { id: "news", label: "News", icon: Icons.news },
  { id: "education", label: "Education", icon: Icons.education },
  { id: "settings", label: "Settings", icon: Icons.settings },
];

function createApp(rootEl) {
  const state = {
    page: "dashboard",
    loaded: false,
    trades: [],
    strategies: DEFAULT_STRATEGIES,
    symbols: PAIRS.slice(),
    eduNotes: EDU_NOTES.slice(),
    eduFiles: EDU_FILES.slice(),
    newsEvents: NEWS_EVENTS.slice(),
    settings: { lang: "English", theme: "Dark", pin: false },
    accounts: DEFAULT_ACCOUNTS.slice(),
  };
  let saveTimer = null;

  function scheduleSave() {
    if (!state.loaded) return;
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveAppState({
        trades: state.trades, strategies: state.strategies, symbols: state.symbols,
        eduNotes: state.eduNotes, eduFiles: state.eduFiles, newsEvents: state.newsEvents, settings: state.settings,
        accounts: state.accounts,
      });
    }, 400);
  }

  function recalcEquity() {
    let eq = 10000;
    state.trades.forEach((t) => { eq += t.pnl; t.equity = eq; });
  }

  const actions = {
    rerender: () => { render(); scheduleSave(); },
    navigate: (page) => { state.page = page; render(); },
    openAddTrade: () => openAddTradeModal(state, actions),
    saveTrade: (trade) => {
      state.trades.push(Object.assign({}, trade));
      recalcEquity();
      render(); scheduleSave();
    },
    updateTrade: (tradeId, updatedFields) => {
      const idx = state.trades.findIndex((t) => t.id === tradeId);
      if (idx === -1) return;
      state.trades[idx] = Object.assign({}, state.trades[idx], updatedFields);
      recalcEquity();
      render(); scheduleSave();
    },
    deleteTrade: (tradeId) => {
      state.trades = state.trades.filter((t) => t.id !== tradeId);
      recalcEquity();
      render(); scheduleSave();
    },
    importTrades: (newTrades) => {
      state.trades.push(...newTrades);
      recalcEquity();
      scheduleSave();
    },
  };

  function buildHeader() {
    const title = (NAV_ITEMS.find((n) => n.id === state.page) || {}).label || "";
    return row([
      col([
        el("span", { style: { color: C.subtext, fontSize: "10.5px", fontWeight: "600", letterSpacing: "0.6px", textTransform: "uppercase" } }, t("FX Discipline")),
        el("span", { style: { color: C.text, fontSize: "18px", fontWeight: "700" } }, t(title)),
      ], { gap: 2 }),
      row([
        el("span", { style: { width: "7px", height: "7px", borderRadius: "999px", background: C.profit, display: "inline-block" } }),
        el("span", { style: { color: C.text, fontSize: "12px", fontWeight: "600" } }, t("Saved on device")),
      ], { gap: 8, style: { padding: "6px 10px", borderRadius: "999px", background: C.card, border: `1px solid ${C.border}` } }),
    ], { justify: "space-between", style: { padding: "16px", borderBottom: `1px solid ${C.border}`, position: "sticky", top: "0", background: C.bg, zIndex: "30" } });
  }

  function buildNav() {
    const bar = row(NAV_ITEMS.map((item) => {
      const active = state.page === item.id;
      const btn = el("button", {
        style: { display: "flex", flexDirection: "column", alignItems: "center", gap: "4px", flexShrink: "0", minWidth: "64px", padding: "4px", background: "none", border: "none", cursor: "pointer" },
      }, [item.icon(19, active ? C.accent : C.subtext), el("span", { style: { fontSize: "9.5px", fontWeight: active ? "700" : "500", color: active ? C.accent : C.subtext } }, t(item.label))]);
      btn.addEventListener("click", () => actions.navigate(item.id));
      return btn;
    }), { gap: 0, style: { overflowX: "auto", padding: "8px 4px" } });
    return el("div", { style: { position: "fixed", bottom: "0", left: "0", right: "0", zIndex: "40", maxWidth: "480px", margin: "0 auto", background: "rgba(15,23,42,0.97)", borderTop: `1px solid ${C.border}`, backdropFilter: "blur(8px)" } }, [bar]);
  }

  function buildPage() {
    switch (state.page) {
      case "dashboard": return renderDashboard(state);
      case "checklist": return renderChecklist(state, actions);
      case "journal": return renderJournal(state, actions);
      case "import": return renderImport(state, actions);
      case "analytics": return renderAnalytics(state);
      case "news": return renderNews(state, actions);
      case "education": return renderEducation(state, actions);
      case "settings": return renderSettings(state, actions);
      default: return el("div", {}, "Unknown page");
    }
  }

  function render() {
    clear(rootEl);

    if (!state.loaded) {
      rootEl.appendChild(el("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", gap: "12px" } }, [
        el("div", { style: { width: "32px", height: "32px", borderRadius: "50%", border: `3px solid ${C.border}`, borderTopColor: C.accent, animation: "spin 0.8s linear infinite" } }),
        el("span", { style: { color: C.subtext, fontSize: "13px" } }, t("Loading your data…")),
      ]));
      return;
    }

    const shell = el("div", { style: { maxWidth: "480px", margin: "0 auto", minHeight: "100vh", position: "relative", paddingBottom: "78px" } }, [
      buildHeader(),
      el("div", { style: { padding: "16px" } }, [buildPage()]),
      buildNav(),
    ]);
    rootEl.appendChild(shell);
  }

  async function init() {
    const saved = await loadAppState();
    if (saved) {
      state.trades = saved.trades || [];
      state.strategies = saved.strategies && saved.strategies.length ? saved.strategies : DEFAULT_STRATEGIES;
      state.symbols = saved.symbols && saved.symbols.length ? saved.symbols : PAIRS.slice();
      state.eduNotes = saved.eduNotes || [];
      state.eduFiles = saved.eduFiles || [];
      state.settings = saved.settings || { lang: "English", theme: "Dark", pin: false };
      state.accounts = saved.accounts && saved.accounts.length ? saved.accounts : DEFAULT_ACCOUNTS.slice();
    } else {
      state.trades = genTrades();
    }
    applyTheme(state.settings.theme);
    setLanguage(state.settings.lang);
    state.loaded = true;
    render();
  }

  render(); // show loading spinner immediately
  init();

  return { state, render };
}

try {
  window.__bootOk = true;
  createApp(document.getElementById("root"));
} catch (err) {
  showBootError(String(err && err.stack ? err.stack : err));
}
</script>
</body>
</html>
