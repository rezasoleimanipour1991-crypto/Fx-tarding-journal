<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TradeMaster Pro | ژورنال روانشناسی معاملاتی فارکس</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #131842;
            --bg-card: rgba(19, 24, 66, 0.7);
            --accent: #00d4aa;
            --accent-red: #ff4757;
            --accent-gold: #ffa502;
            --accent-blue: #3742fa;
            --accent-purple: #a55eea;
            --accent-pink: #ff6b81;
            --text-primary: #ffffff;
            --text-secondary: #a4b0be;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.05);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Vazirmatn', Tahoma, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Header */
        .app-header {
            background: var(--bg-secondary);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4aa, #00a8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .nav-item.active {
            background: var(--accent);
            color: var(--bg-primary);
            font-weight: bold;
            transform: translateY(-5px);
        }

        /* Main Container */
        .main-container {
            padding: 20px 15px 120px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--accent);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 15px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4aa, #00a8ff);
            color: var(--bg-primary);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
        }

        .btn-ghost {
            background: var(--glass);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Grid */
        .grid {
            display: grid;
            gap: 20px;
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        /* Emotion Selector */
        .emotion-scale {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .emotion-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 2px solid var(--border);
            background: var(--glass);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .emotion-btn.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
            transform: scale(1.1);
        }

        .emotion-btn.low { background: rgba(0, 212, 170, 0.3); }
        .emotion-btn.medium { background: rgba(255, 165, 2, 0.3); }
        .emotion-btn.high { background: rgba(255, 71, 87, 0.3); }

        /* Psychology Checklist */
        .psych-check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            margin: 8px 0;
            background: var(--glass);
            border-radius: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .psych-check-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .psych-check-item.selected {
            background: rgba(0, 212, 170, 0.15);
            border-color: var(--accent);
        }

        .psych-check-item .checkbox-indicator {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .psych-check-item.selected .checkbox-indicator {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        /* Slider for intensity */
        .intensity-slider {
            width: 100%;
            margin: 10px 0;
            -webkit-appearance: none;
            height: 8px;
            background: var(--glass);
            border-radius: 4px;
            outline: none;
        }

        .intensity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid white;
        }

        /* Tags */
        .tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin: 3px;
        }

        .tag-success { background: rgba(0, 212, 170, 0.2); color: var(--accent); }
        .tag-danger { background: rgba(255, 71, 87, 0.2); color: var(--accent-red); }
        .tag-warning { background: rgba(255, 165, 2, 0.2); color: var(--accent-gold); }
        .tag-info { background: rgba(55, 66, 250, 0.2); color: var(--accent-blue); }
        .tag-purple { background: rgba(165, 94, 234, 0.2); color: var(--accent-purple); }

        /* Psychology Profile Card */
        .psych-profile {
            background: linear-gradient(135deg, rgba(165, 94, 234, 0.1), rgba(0, 212, 170, 0.1));
            border: 1px solid var(--accent-purple);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
        }

        /* Warning/Alert Cards */
        .alert-card {
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            border-right: 4px solid;
        }

        .alert-danger {
            background: rgba(255, 71, 87, 0.1);
            border-color: var(--accent-red);
        }

        .alert-warning {
            background: rgba(255, 165, 2, 0.1);
            border-color: var(--accent-gold);
        }

        .alert-success {
            background: rgba(0, 212, 170, 0.1);
            border-color: var(--accent);
        }

        /* Trade Card */
        .trade-card {
            background: var(--glass);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            position: relative;
        }

        .trade-card.win { border-right: 4px solid var(--accent); }
        .trade-card.loss { border-right: 4px solid var(--accent-red); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 90%;
            width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }

        /* Progress Bar */
        .progress-bar {
            height: 8px;
            background: var(--glass);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-blue));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        @media (max-width: 768px) {
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up {
            animation: slideUp 0.5s ease;
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;">
        <div style="font-size:3rem;margin-bottom:20px;">🧠</div>
        <h1 style="background: linear-gradient(135deg, #a55eea, #00d4aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 2rem; margin-bottom: 10px;">TradePsychology Pro</h1>
        <p style="color: var(--text-secondary);">سیستم تحلیل روانشناسی معاملاتی</p>
        <div style="width: 50px; height: 50px; border: 3px solid var(--glass); border-top-color: var(--accent-purple); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px;"></div>
    </div>

    <!-- Header -->
    <header class="app-header" id="app-header" style="display:none;">
        <div class="app-logo">🧠 TradePsychology Pro</div>
        <div style="display:flex;gap:10px;">
            <span class="tag tag-success" id="streak-indicator">--</span>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-container" id="main-content" style="display:none;"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottom-nav" style="display:none;">
        <button class="nav-item active" data-tab="dashboard">
            <span>📊</span> داشبورد
        </button>
        <button class="nav-item" data-tab="journal">
            <span>📝</span> ژورنال
        </button>
        <button class="nav-item" data-tab="psychology">
            <span>🧠</span> روانشناسی
        </button>
        <button class="nav-item" data-tab="analytics">
            <span>📈</span> آنالیز
        </button>
        <button class="nav-item" data-tab="insights">
            <span>💡</span> بینش‌ها
        </button>
    </nav>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script>
        // ============================================
        // DATABASE MANAGER
        // ============================================
        class DatabaseManager {
            constructor() {
                this.db = null;
            }

            async init() {
                this.db = await idb.openDB('TradePsychologyPro', 2, {
                    upgrade(db) {
                        // Trades Store with extended psychology fields
                        if (!db.objectStoreNames.contains('trades')) {
                            const store = db.createObjectStore('trades', { keyPath: 'id', autoIncrement: true });
                            store.createIndex('date', 'date');
                            store.createIndex('symbol', 'symbol');
                            store.createIndex('result', 'result');
                        }

                        // Psychology Profiles Store
                        if (!db.objectStoreNames.contains('psychProfiles')) {
                            db.createObjectStore('psychProfiles', { keyPath: 'id', autoIncrement: true });
                        }

                        // Settings
                        if (!db.objectStoreNames.contains('settings')) {
                            db.createObjectStore('settings', { keyPath: 'key' });
                        }
                    }
                });
            }
        }

        // ============================================
        // PSYCHOLOGY ENGINE
        // ============================================
        class PsychologyEngine {
            constructor(trades) {
                this.trades = trades;
            }

            // Comprehensive list of trading emotions and behaviors
            static EMOTION_CATEGORIES = {
                fear: {
                    label: '😨 ترس‌ها',
                    items: [
                        { id: 'fear_entry', label: 'ترس از ورود به معامله', description: 'تردید در باز کردن معامله با وجود سیگنال معتبر' },
                        { id: 'fear_loss', label: 'ترس از ضرر کردن', description: 'نگرانی بیش از حد از باخت در معامله' },
                        { id: 'fear_missing', label: 'فومو (FOMO)', description: 'ترس از دست دادن فرصت معاملاتی' },
                        { id: 'fear_profit_loss', label: 'ترس از دست دادن سود', description: 'بستن زودهنگام معامله سودده از ترس برگشت قیمت' },
                        { id: 'fear_reentry', label: 'ترس از ورود مجدد', description: 'عدم ورود مجدد پس از یک ضرر یا سود' },
                        { id: 'fear_holding', label: 'ترس از نگه داشتن معامله', description: 'عدم توانایی در حفظ معامله باز' }
                    ]
                },
                greed: {
                    label: '💰 طمع',
                    items: [
                        { id: 'greed_overtrade', label: 'طمع برای معاملات بیشتر', description: 'ورود به معاملات اضافی برای سود بیشتر' },
                        { id: 'greed_size', label: 'طمع در حجم معامله', description: 'افزایش حجم معامله بیش از حد مجاز' },
                        { id: 'greed_target', label: 'طمع در هدف سود', description: 'جابجایی TP برای سود بیشتر' },
                        { id: 'greed_hold', label: 'طمع در نگهداری', description: 'نگه داشتن معامله سودده برای سود بیشتر' }
                    ]
                },
                impulsivity: {
                    label: '⚡ عجله و تکانشگری',
                    items: [
                        { id: 'rush_entry', label: 'عجله در ورود', description: 'ورود به معامله قبل از تکمیل سیگنال' },
                        { id: 'rush_exit', label: 'عجله در خروج', description: 'خروج سریع بدون دلیل منطقی' },
                        { id: 'rush_decision', label: 'تصمیم‌گیری عجولانه', description: 'تصمیم‌گیری بدون تحلیل کافی' },
                        { id: 'impatient_wait', label: 'بی‌صبری در انتظار', description: 'عدم توانایی در صبر برای ستاپ مناسب' }
                    ]
                },
                revenge: {
                    label: '😤 انتقام و خشم',
                    items: [
                        { id: 'revenge_trade', label: 'ترید انتقامی', description: 'ورود به معامله بلافاصله بعد از ضرر برای جبران' },
                        { id: 'revenge_size', label: 'افزایش حجم برای جبران', description: 'بزرگ کردن حجم معامله بعد از ضرر' },
                        { id: 'anger_market', label: 'خشم از بازار', description: 'احساس خشم و ناامیدی نسبت به حرکت قیمت' },
                        { id: 'blame_external', label: 'مقصر دانستن عوامل خارجی', description: 'عدم پذیرش مسئولیت ضرر' }
                    ]
                },
                overconfidence: {
                    label: '🎭 اعتماد به نفس کاذب',
                    items: [
                        { id: 'overconf_after_win', label: 'غرور بعد از برد', description: 'اعتماد به نفس بیش از حد پس از چند معامله موفق' },
                        { id: 'overconf_risk', label: 'نادیده گرفتن ریسک', description: 'کم اهمیت شمردن مدیریت ریسک' },
                        { id: 'overconf_rules', label: 'شکستن قوانین', description: 'نادیده گرفتن استراتژی از روی اعتماد به نفس' },
                        { id: 'overconf_analysis', label: 'تحلیل سطحی', description: 'تحلیل ناقص به دلیل اطمینان بیش از حد' }
                    ]
                },
                discipline: {
                    label: '📋 انضباط معاملاتی',
                    items: [
                        { id: 'followed_plan', label: 'طبق پلن معامله کردم', description: 'معامله کاملاً مطابق با استراتژی', positive: true },
                        { id: 'deviated_plan', label: 'خارج از پلن معامله کردم', description: 'انحراف از استراتژی معاملاتی', positive: false },
                        { id: 'skipped_checklist', label: 'چک‌لیست را نادیده گرفتم', description: 'عدم استفاده از چک‌لیست', positive: false },
                        { id: 'followed_checklist', label: 'چک‌لیست را کامل انجام دادم', description: 'رعایت کامل چک‌لیست', positive: true },
                        { id: 'moved_sl', label: 'حد ضرر را جابجا کردم', description: 'تغییر SL از مقدار تعیین شده' },
                        { id: 'moved_tp', label: 'حد سود را جابجا کردم', description: 'تغییر TP از مقدار تعیین شده' },
                        { id: 'closed_early', label: 'معامله را زودتر بستم', description: 'خروج قبل از رسیدن به TP یا SL' }
                    ]
                },
                mental_state: {
                    label: '🧘 وضعیت ذهنی',
                    items: [
                        { id: 'focused', label: 'تمرکز کامل داشتم', description: 'حضور ذهن و تمرکز بالا', positive: true },
                        { id: 'distracted', label: 'حواس‌پرتی داشتم', description: 'عدم تمرکز کافی حین معامله' },
                        { id: 'tired', label: 'خسته بودم', description: 'معامله در حالت خستگی' },
                        { id: 'stressed', label: 'استرس داشتم', description: 'معامله تحت فشار روحی' },
                        { id: 'emotional', label: 'احساسی بودم', description: 'تصمیم‌گیری بر اساس احساسات' },
                        { id: 'calm', label: 'آرامش داشتم', description: 'معامله در آرامش ذهنی', positive: true },
                        { id: 'anxious', label: 'اضطراب داشتم', description: 'نگرانی و دلهره حین معامله' }
                    ]
                },
                external_factors: {
                    label: '🌍 عوامل خارجی',
                    items: [
                        { id: 'affected_prev_loss', label: 'تحت تأثیر ضرر قبلی', description: 'معامله قبلی روی این تصمیم اثر گذاشت' },
                        { id: 'affected_prev_win', label: 'تحت تأثیر سود قبلی', description: 'سود معامله قبل باعث تغییر رفتار شد' },
                        { id: 'personal_stress', label: 'مشکلات شخصی', description: 'مسائل زندگی شخصی روی معامله اثر گذاشت' },
                        { id: 'market_noise', label: 'تحت تأثیر نویز بازار', description: 'شایعات و اخبار تأیید نشده' },
                        { id: 'social_pressure', label: 'تحت فشار اجتماعی', description: 'تأثیر نظرات دیگران در تصمیم‌گیری' }
                    ]
                }
            };

            analyzePsychology(trade) {
                const analysis = {
                    emotionalState: this.assessEmotionalState(trade),
                    riskBehaviors: this.identifyRiskBehaviors(trade),
                    disciplineScore: this.calculateDisciplineScore(trade),
                    cognitiveBiases: this.identifyCognitiveBiases(trade),
                    recommendations: []
                };

                // Generate recommendations based on analysis
                if (trade.emotions?.includes('fear_profit_loss') && trade.profit > 0) {
                    analysis.recommendations.push({
                        type: 'fear',
                        message: 'ترس از دست دادن سود باعث شده معاملات سودده را زودتر ببندید. اعتماد به تحلیل خود را تمرین کنید.',
                        severity: 'medium'
                    });
                }

                if (trade.emotions?.includes('revenge_trade')) {
                    analysis.recommendations.push({
                        type: 'danger',
                        message: 'ترید انتقامی شناسایی شد! بعد از هر ضرر حداقل ۳۰ دقیقه از چارت فاصله بگیرید.',
                        severity: 'high'
                    });
                }

                if (trade.emotions?.includes('rushed_entry')) {
                    analysis.recommendations.push({
                        type: 'warning',
                        message: 'عجله در ورود باعث معاملات غیرضروری می‌شود. صبر کنید تا تمام شرایط استراتژی محقق شود.',
                        severity: 'medium'
                    });
                }

                if (trade.deviatedFromPlan) {
                    analysis.recommendations.push({
                        type: 'danger',
                        message: 'خروج از پلن معاملاتی! به استراتژی خود پایبند باشید حتی اگر وسوسه‌انگیز باشد.',
                        severity: 'high'
                    });
                }

                return analysis;
            }

            assessEmotionalState(trade) {
                const emotionalLoad = (trade.emotions?.length || 0);
                const negativeEmotions = trade.emotions?.filter(e => 
                    !e.includes('calm') && !e.includes('focused') && !e.includes('followed_plan')
                ).length || 0;

                let state = 'neutral';
                let score = 5;

                if (negativeEmotions > 3) {
                    state = 'highly_emotional';
                    score = 2;
                } else if (negativeEmotions > 1) {
                    state = 'emotional';
                    score = 4;
                } else if (emotionalLoad === 0) {
                    state = 'calm';
                    score = 8;
                }

                return { state, score, negativeEmotions, totalEmotions: emotionalLoad };
            }

            identifyRiskBehaviors(trade) {
                const behaviors = [];

                if (trade.emotions?.includes('greed_size') && trade.positionSize > trade.normalPositionSize) {
                    behaviors.push({ type: 'oversizing', severity: 'high', 
                        detail: `حجم معامله ${trade.positionSize} لات (بیشتر از حد نرمال)` });
                }

                if (trade.emotions?.includes('moved_sl')) {
                    behaviors.push({ type: 'sl_manipulation', severity: 'high',
                        detail: 'حد ضرر جابجا شده است' });
                }

                if (trade.emotions?.includes('skipped_checklist')) {
                    behaviors.push({ type: 'skipped_protocol', severity: 'medium',
                        detail: 'چک‌لیست انجام نشده' });
                }

                return behaviors;
            }

            calculateDisciplineScore(trade) {
                let score = 100;
                
                if (trade.deviatedFromPlan) score -= 30;
                if (trade.emotions?.includes('skipped_checklist')) score -= 20;
                if (trade.emotions?.includes('moved_sl')) score -= 15;
                if (trade.emotions?.includes('moved_tp')) score -= 10;
                if (trade.emotions?.includes('closed_early') && trade.profit > 0) score -= 15;
                if (trade.emotions?.includes('followed_plan')) score += 10;
                if (trade.emotions?.includes('followed_checklist')) score += 10;

                return Math.max(0, Math.min(100, score));
            }

            identifyCognitiveBiases(trade) {
                const biases = [];

                if (trade.emotions?.includes('overconf_after_win')) {
                    biases.push('Overconfidence Bias');
                }
                if (trade.emotions?.includes('fear_missing')) {
                    biases.push('FOMO Bias');
                }
                if (trade.emotions?.includes('revenge_trade')) {
                    biases.push('Revenge Trading Bias');
                }
                if (trade.emotions?.includes('blame_external')) {
                    biases.push('External Attribution Bias');
                }

                return biases;
            }

            getOverallPsychologyScore(trades) {
                if (trades.length === 0) return 0;
                
                let totalScore = 0;
                trades.forEach(trade => {
                    const analysis = this.analyzePsychology(trade);
                    totalScore += analysis.emotionalState.score;
                });

                return (totalScore / trades.length).toFixed(1);
            }

            getEmotionFrequency(trades) {
                const frequency = {};
                trades.forEach(trade => {
                    if (trade.emotions) {
                        trade.emotions.forEach(emotion => {
                            frequency[emotion] = (frequency[emotion] || 0) + 1;
                        });
                    }
                });
                return frequency;
            }
        }

                setTimeout(() => this.renderAnalyticsCharts(trades), 100);
            }

            renderAnalyticsCharts(trades) {
                // Emotion correlation chart
                const psychEngine = new PsychologyEngine(trades);
                const emotionData = psychEngine.getEmotionFrequency(trades);
                
                new Chart(document.getElementById('emotionChart'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(emotionData).slice(0, 10),
                        datasets: [{
                            label: 'تعداد دفعات',
                            data: Object.values(emotionData).slice(0, 10),
                            backgroundColor: 'rgba(165, 94, 234, 0.5)',
                            borderColor: '#a55eea'
                        }]
                    }
                });

                // Discipline score over time
                const scores = trades.map(t => psychEngine.calculateDisciplineScore(t));
                new Chart(document.getElementById('disciplineChart'), {
                    type: 'line',
                    data: {
                        labels: trades.map((_, i) => `معامله ${i + 1}`),
                        datasets: [{
                            label: 'نمره انضباط',
                            data: scores,
                            borderColor: '#00d4aa',
                            tension: 0.4
                        }]
                    }
                });
            }

            async loadInsights() {
                const trades = await this.db.db.getAll('trades');
                const psychEngine = new PsychologyEngine(trades);
                
                // Gather all recommendations
                const allRecommendations = [];
                trades.forEach(trade => {
                    const analysis = psychEngine.analyzePsychology(trade);
                    allRecommendations.push(...analysis.recommendations);
                });

                const content = document.getElementById('main-content');
                content.innerHTML = `
                    <div class="slide-up">
                        <h2 style="margin-bottom:20px;">💡 بینش‌ها و توصیه‌های شخصی‌سازی شده</h2>
                        ${allRecommendations.length > 0 ? allRecommendations.map(rec => `
                            <div class="alert-card alert-${rec.severity === 'high' ? 'danger' : 'warning'}">
                                <strong>${rec.type === 'danger' ? '🔴' : rec.type === 'warning' ? '🟡' : '🟢'}</strong>
                                ${rec.message}
                            </div>
                        `).join('') : '<div class="alert-card alert-success">✅ رفتار معاملاتی شما در وضعیت خوبی قرار دارد</div>'}
                    </div>
                `;
            }
        }

        // Initialize app
        window.app = new TradePsychologyApp();
        document.addEventListener('DOMContentLoaded', () => window.app.init());

        // Close modal on overlay click
        document.addEventListener('click', (e) => {
            if (e.target.id === 'modal-overlay') {
                window.app.closeModal();
            }
        });

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
</body>
</html>
