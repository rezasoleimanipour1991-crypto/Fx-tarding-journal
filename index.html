<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0C0F1A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FX Journal" />
  <meta name="description" content="Mobile-first forex trading journal. 100% offline, no external dependencies. Your data stays on this device." />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>FX Discipline — Trading Journal</title>
  <style>
    /* ========== Glass Data Dashboard Theme ========== */
    html, body { margin: 0; padding: 0; background: linear-gradient(135deg, #0C0F1A 0%, #0A0D16 100%); overscroll-behavior-y: none; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans Arabic", "Tahoma", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    html[lang="fa"] body, html[dir="rtl"] body {
      font-family: "Tahoma", "Noto Sans Arabic", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; max-width: 1200px; margin: 0 auto; width: 100%; }
    @media (min-width: 768px) {
      #root { flex-direction: row; }
    }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { display: none; }
    input::placeholder, textarea::placeholder { color: #94A3B8; opacity: 0.7; }
    select { appearance: none; -webkit-appearance: none; }
    input[type="range"] { accent-color: #818CF8; width: 100%; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    button { font-family: inherit; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #boot-error {
      display: none; max-width: 420px; background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(68, 103, 199, 0.25); border-radius: 16px; padding: 16px;
      color: #F1F5F9; font-size: 13px; line-height: 1.6; text-align: left;
      white-space: pre-wrap; word-break: break-word; margin-top: 14px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    #boot-error.show { display: block; }
    #boot-error b { color: #F87171; }
  </style>
  <script>
    window.__bootOk = false;
    window.addEventListener("error", function (e) {
      showBootError("Script error: " + (e.message || "unknown error") + (e.lineno ? " (line " + e.lineno + ")" : ""));
    });
    function showBootError(msg) {
      if (window.__bootOk) return;
      var el2 = document.getElementById("boot-error");
      if (el2) { el2.classList.add("show"); el2.innerHTML = "<b>Details:</b>\n" + msg; }
    }
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js").then(function (reg) {
          reg.update().catch(function () {});
        }).catch(function (err) {
          console.warn("Service worker registration failed (app still works fully without it):", err);
        });
      });
    }
  </script>
</head>
<body>
<div id="root">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#CBD5E1;font-family:'Inter',sans-serif;font-size:14px;padding:24px;text-align:center;">
    <div style="width:32px;height:32px;border-radius:50%;border:1px solid rgba(68,103,199,0.3);border-top-color:#818CF8;animation:spin 0.8s linear infinite;margin-bottom:14px;"></div>
    Starting FX Discipline…
    <div id="boot-error"></div>
  </div>
</div>

</html>
